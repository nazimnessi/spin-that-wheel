<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spin that wheel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Added 'Outfit' font for a cleaner look -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --bg-secondary: #16161c;
      --fg: #f0f0f5;
      --muted: #6b6b80;
      --accent: #f59e0b;
      --accent-light: #fbbf24;
      --accent-glow: rgba(245, 158, 11, 0.3);
      --card: #1c1c24;
      --border: #2a2a38;
      --danger: #ef4444;
      --success: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1, h2, h3 { font-family: 'Outfit', sans-serif; }

    .bg-atmosphere {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: 
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245, 158, 11, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at 90% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at 10% 80%, rgba(20, 184, 166, 0.06) 0%, transparent 50%);
    }

    /* Wheel Container */
    .wheel-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wheel-glow {
      position: absolute;
      width: 120%;
      height: 120%;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.5s;
      z-index: 0;
    }

    .wheel-wrapper.spinning .wheel-glow {
      opacity: 1;
      animation: pulse-glow 0.8s infinite alternate;
    }

    @keyframes pulse-glow {
      from { transform: scale(1); opacity: 0.5; }
      to { transform: scale(1.15); opacity: 0.9; }
    }

    .wheel-canvas {
      position: relative;
      z-index: 2;
      border-radius: 50%;
      box-shadow: 
        0 0 0 8px var(--bg-secondary),
        0 0 0 12px var(--border),
        0 25px 50px -12px rgba(0,0,0,0.6);
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
      max-width: 100%;
    }

    /* Pointer */
    .wheel-pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      filter: drop-shadow(0 10px 10px rgba(0,0,0,0.6));
    }

    /* Center Spin Button */
    .spin-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1c1c24 0%, #0f0f13 100%);
      border: 4px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: all 0.2s ease;
    }

    .spin-btn:hover:not(:disabled) {
      border-color: var(--accent);
      box-shadow: 0 0 25px var(--accent-glow);
      transform: translate(-50%, -50%) scale(1.05);
    }

    .spin-btn:active:not(:disabled) { transform: translate(-50%, -50%) scale(0.95); }
    .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Form Elements */
    .input-field {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 14px 18px;
      border-radius: 16px;
      width: 100%;
      font-size: 16px;
      outline: none;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
    }

    .btn {
      padding: 14px 28px;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-light);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2);
    }

    .btn-secondary {
      background: var(--card);
      color: var(--fg);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover { background: #252530; }

    .btn-restore {
        background: rgba(34, 197, 94, 0.1);
        color: var(--success);
        border: 1px solid rgba(34, 197, 94, 0.3);
        padding: 8px 16px;
        font-size: 14px;
    }
    
    .btn-restore:hover {
        background: rgba(34, 197, 94, 0.2);
    }

    /* Items */
    .item-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 100px;
      font-size: 14px;
      transition: all 0.2s;
    }

    .item-chip:hover { border-color: var(--muted); }

    /* Toggle Switch */
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 28px;
      flex-shrink: 0;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--border);
      transition: 0.4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }

    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(24px); }

    /* History */
    .history-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideIn 0.3s ease forwards;
      opacity: 0;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .history-value { font-weight: 600; font-size: 15px; color: var(--fg); }
    .history-time { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.3s;
      position: relative;
      overflow: hidden;
    }

    .modal-overlay.active .modal-content { transform: scale(1); }

    .result-title {
      font-size: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      font-family: 'Outfit', sans-serif;
    }

    .result-value {
      font-family: 'Outfit', sans-serif;
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--accent) 0%, #fbbf24 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 30px;
      word-break: break-word;
      letter-spacing: -0.02em;
    }

    /* Confetti Particle */
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 150;
      opacity: 0;
    }
    
    @keyframes confetti-fall {
      0% {
        opacity: 1;
        transform: translateY(0) rotate(0deg) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(100vh) rotate(720deg) scale(0);
      }
    }

    /* Utilities */
    .fade-in { animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg-atmosphere"></div>

  <main class="relative z-10 py-8 px-4 min-h-screen">
    <div class="max-w-6xl mx-auto">
      
      <header class="text-center mb-12 fade-in">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-3 tracking-tight">Spin that wheel</h1>
        <p class="text-[var(--muted)] text-lg">Add options, spin, and let fate decide</p>
      </header>

      <div class="grid lg:grid-cols-[1fr_360px] gap-10 items-start">
        
        <!-- Left Column -->
        <div class="space-y-8">
          
          <!-- Wheel Area -->
          <div class="flex justify-center fade-in" style="animation-delay: 100ms">
            <div class="wheel-wrapper" id="wheelWrapper" style="width: 380px; height: 380px;">
              <div class="wheel-glow"></div>
              
              <!-- Pointer -->
              <svg class="wheel-pointer" width="44" height="55" viewBox="0 0 44 55">
                <path d="M22 55 L0 0 L44 0 Z" fill="var(--accent)" />
                <path d="M22 45 L6 6 L38 6 Z" fill="#fbbf24" />
              </svg>
              
              <canvas id="wheelCanvas" class="wheel-canvas" width="760" height="760"></canvas>
              
              <button class="spin-btn" id="spinBtn" aria-label="Spin the wheel">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
              </button>
            </div>
          </div>

          <!-- Settings & Input -->
          <div class="max-w-lg mx-auto space-y-4 fade-in" style="animation-delay: 200ms">
            
            <!-- Toggles Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <!-- Auto-Remove Toggle -->
                <div class="toggle-container">
                <div class="mr-2">
                    <span class="font-semibold block text-white text-sm">Auto-Remove</span>
                    <span class="text-xs text-[var(--muted)]">Remove on win</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="autoRemoveToggle">
                    <span class="slider"></span>
                </label>
                </div>

                <!-- Sound Toggle -->
                <div class="toggle-container">
                <div class="mr-2">
                    <span class="font-semibold block text-white text-sm">Sound FX</span>
                    <span class="text-xs text-[var(--muted)]">Winning chime</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="soundToggle" checked>
                    <span class="slider"></span>
                </label>
                </div>
            </div>

            <!-- Input -->
            <div class="flex gap-3">
              <input 
                type="text" 
                class="input-field flex-1" 
                id="itemInput" 
                placeholder="Enter options (comma separated)..."
                aria-label="Enter options"
              >
              <button class="btn btn-primary" id="addBtn">Add</button>
            </div>
            
            <!-- Items List -->
            <div class="pt-2">
              <div class="flex items-center justify-between mb-3">
                <span class="font-semibold text-[var(--muted)]">Options: <span id="itemCount">0</span></span>
                <div class="flex gap-2">
                    <button class="btn btn-restore hidden" id="restoreBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                        Restore
                    </button>
                    <button class="text-sm text-[var(--danger)] hover:underline" id="clearAllBtn" style="display: none;">Clear All</button>
                </div>
              </div>
              <div class="flex flex-wrap gap-2" id="itemsList">
                <p class="text-[var(--muted)] text-sm">No options added yet</p>
              </div>
            </div>

            <!-- Share -->
            <div class="bg-[var(--card)] border border-[var(--border)] rounded-2xl p-5 mt-6">
              <div class="flex items-center gap-3 mb-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                <h3 class="font-bold">Share Your Wheel</h3>
              </div>
              <p class="text-sm text-[var(--muted)] mb-3">Generate a link with your current options.</p>
              <button class="btn btn-secondary w-full" id="shareBtn">Copy Share Link</button>
            </div>

          </div>
        </div>

        <!-- Right Column: History -->
        <div class="fade-in lg:sticky lg:top-8" style="animation-delay: 300ms">
          <div class="bg-[var(--card)] border border-[var(--border)] rounded-2xl p-5">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-xl font-bold">Spin History</h3>
              <button class="text-xs text-[var(--muted)] hover:text-[var(--danger)] transition-colors" id="clearHistoryBtn" style="display: none;">Clear</button>
            </div>
            <div class="space-y-2 max-h-[500px] overflow-y-auto pr-1" id="historyList">
              <p class="text-center text-[var(--muted)] py-10 text-sm">Spin the wheel to start</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Result Modal -->
  <div class="modal-overlay" id="resultModal">
    <div class="modal-content">
      <p class="result-title">The Winner Is</p>
      <h2 class="result-value" id="resultValue">...</h2>
      <button class="btn btn-primary w-full text-lg py-4" id="closeModalBtn">Got it</button>
    </div>
  </div>

  <script>
    // === State ===
    let items = [];           // Currently active items on the wheel
    let baseItems = [];       // The "saved" state before auto-removes happened
    let history = [];
    let isSpinning = false;
    let currentRotation = 0;
    let lastWinnerIndex = -1;
    let audioContext = null;

    // Storage Key constant
    const STORAGE_KEY = 'fortuneWheelHistory';

    // === DOM Elements ===
    const wheelCanvas = document.getElementById('wheelCanvas');
    const ctx = wheelCanvas.getContext('2d');
    const wheelWrapper = document.getElementById('wheelWrapper');
    const spinBtn = document.getElementById('spinBtn');
    const itemInput = document.getElementById('itemInput');
    const addBtn = document.getElementById('addBtn');
    const itemsList = document.getElementById('itemsList');
    const itemCount = document.getElementById('itemCount');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const restoreBtn = document.getElementById('restoreBtn');
    const shareBtn = document.getElementById('shareBtn');
    const historyList = document.getElementById('historyList');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const resultModal = document.getElementById('resultModal');
    const resultValue = document.getElementById('resultValue');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const autoRemoveToggle = document.getElementById('autoRemoveToggle');
    const soundToggle = document.getElementById('soundToggle');

    // === Config ===
    const COLORS = [
      '#f59e0b', '#8b5cf6', '#14b8a6', '#ec4899', 
      '#3b82f6', '#22c55e', '#f97316', '#06b6d4', 
      '#d946ef', '#84cc16', '#6366f1', '#ef4444'
    ];

    // === Initialization ===
    function init() {
      loadFromURL();
      loadHistory();
      
      // Initialize baseItems with loaded items
      baseItems = [...items];
      
      renderWheel();
      renderItems();
      renderHistory();
      setupListeners();
    }

    function loadFromURL() {
      const params = new URLSearchParams(window.location.search);
      const data = params.get('d');
      if (data) {
        try {
          const decoded = JSON.parse(atob(data));
          if (Array.isArray(decoded)) items = decoded.filter(i => i && typeof i === 'string');
        } catch (e) { console.log("No valid data in URL"); }
      }
    }

    function loadHistory() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) history = JSON.parse(saved);
      } catch (e) { 
        history = []; 
      }
    }

    function saveHistory() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      } catch (e) {
        console.error("Failed to save history");
      }
    }

    // === Audio ===
    function playWinSound() {
        if (!soundToggle.checked) return;
        
        // Initialize AudioContext on first user interaction
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        const now = audioContext.currentTime;
        
        // Create a simple pleasant chime
        const osc = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        osc.connect(gainNode);
        gainNode.connect(audioContext.destination);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, now); // A5
        osc.frequency.setValueAtTime(1318.5, now + 0.1); // E6
        osc.frequency.setValueAtTime(1760, now + 0.2); // A6

        gainNode.gain.setValueAtTime(0.1, now);
        gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 0.8);

        osc.start(now);
        osc.stop(now + 0.8);
    }

    // === Event Listeners ===
    function setupListeners() {
      spinBtn.addEventListener('click', spin);
      addBtn.addEventListener('click', addItems);
      itemInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addItems(); });
      clearAllBtn.addEventListener('click', clearAll);
      restoreBtn.addEventListener('click', restoreItems);
      shareBtn.addEventListener('click', shareWheel);
      clearHistoryBtn.addEventListener('click', clearHistory);
      closeModalBtn.addEventListener('click', closeModal);
    }

    // === Core Logic ===
    function addItems() {
      const val = itemInput.value.trim();
      if (!val) return;
      
      const newItems = val.split(',')
                         .map(s => s.trim())
                         .filter(s => s && !items.includes(s));
      
      if (newItems.length > 0) {
        items.push(...newItems);
        // Update base items to include new additions
        baseItems = [...items];
        
        itemInput.value = '';
        renderWheel();
        renderItems();
      }
      itemInput.focus();
    }

    window.removeItem = function(itemToRemove) {
      items = items.filter(i => i !== itemToRemove);
      // If manually removed, also remove from baseItems so it doesn't come back on restore
      baseItems = baseItems.filter(i => i !== itemToRemove);
      
      renderWheel();
      renderItems();
    }

    function clearAll() {
      items = [];
      baseItems = [];
      renderWheel();
      renderItems();
    }

    function restoreItems() {
        items = [...baseItems];
        renderWheel();
        renderItems();
    }

    function clearHistory() {
      history = [];
      saveHistory();
      renderHistory();
    }

    // === Wheel Mechanics ===
    function spin() {
      if (isSpinning || items.length === 0) return;

      isSpinning = true;
      spinBtn.disabled = true;
      wheelWrapper.classList.add('spinning');

      // Determine winner index
      lastWinnerIndex = Math.floor(Math.random() * items.length);
      const winnerItem = items[lastWinnerIndex];

      // Calculate rotation
      const sliceAngle = 360 / items.length;
      const randomOffset = (Math.random() * sliceAngle * 0.6) - (sliceAngle * 0.3);
      const targetAngle = 360 - (lastWinnerIndex * sliceAngle) - (sliceAngle / 2) + randomOffset;
      
      const spins = 6 + Math.floor(Math.random() * 3);
      const totalRotation = currentRotation + (spins * 360) + targetAngle - (currentRotation % 360);

      currentRotation = totalRotation;
      wheelCanvas.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        isSpinning = false;
        spinBtn.disabled = false;
        wheelWrapper.classList.remove('spinning');
        
        handleResult(winnerItem);
      }, 4200);
    }

    function handleResult(winnerItem) {
      // 1. Play Sound
      playWinSound();

      // 2. Show result modal
      resultValue.textContent = winnerItem;
      resultModal.classList.add('active');
      createConfetti();

      // 3. Add to history
      history.unshift({ value: winnerItem, time: Date.now() });
      if (history.length > 50) history.pop();
      saveHistory();
      renderHistory();

      // 4. Handle auto-remove
      if (autoRemoveToggle.checked) {
        // Remove ONLY from active items. Keep in baseItems for restore functionality.
        items.splice(lastWinnerIndex, 1);
        
        renderWheel();
        renderItems();
      }
    }

    function closeModal() {
      resultModal.classList.remove('active');
    }

    // === Rendering ===
    function renderItems() {
      itemCount.textContent = items.length;
      clearAllBtn.style.display = items.length > 0 ? 'block' : 'none';
      
      // Show restore button only if items have been removed and baseItems has more than current items
      if (items.length < baseItems.length) {
          restoreBtn.classList.remove('hidden');
      } else {
          restoreBtn.classList.add('hidden');
      }

      if (items.length === 0) {
        itemsList.innerHTML = '<p class="text-[var(--muted)] text-sm">No options added yet</p>';
        spinBtn.disabled = true;
        return;
      }
      spinBtn.disabled = false;

      itemsList.innerHTML = items.map(item => `
        <div class="item-chip">
          <span>${escapeHtml(item)}</span>
          <button onclick="removeItem('${escapeHtml(item)}')" class="hover:text-[var(--danger)] transition-colors p-1" aria-label="Remove ${escapeHtml(item)}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
      `).join('');
    }

    function renderHistory() {
      clearHistoryBtn.style.display = history.length > 0 ? 'block' : 'none';
      
      if (history.length === 0) {
        historyList.innerHTML = '<p class="text-center text-[var(--muted)] py-10 text-sm">Spin the wheel to start</p>';
        return;
      }

      historyList.innerHTML = history.map((h, index) => `
        <div class="history-card" style="animation-delay: ${index * 0.05}s">
          <div>
            <div class="history-value">${escapeHtml(h.value)}</div>
            <div class="history-time">${formatDate(h.time)}</div>
          </div>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
      `).join('');
    }

    function renderWheel() {
      const w = 760, h = 760;
      const cx = w / 2, cy = h / 2;
      const r = w / 2 - 20;

      ctx.clearRect(0, 0, w, h);

      if (items.length === 0) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = '#1c1c24';
        ctx.fill();
        ctx.strokeStyle = '#2a2a38';
        ctx.lineWidth = 4;
        ctx.stroke();
        
        ctx.fillStyle = '#6b6b80';
        ctx.font = '500 32px Outfit';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Add options', cx, cy);
        return;
      }

      const sliceAngle = (Math.PI * 2) / items.length;
      
      // Dynamic font size for the wheel
      let fontSize = 32;
      if (items.length > 4) fontSize = 28;
      if (items.length > 8) fontSize = 24;
      if (items.length > 12) fontSize = 20;
      if (items.length > 18) fontSize = 16;

      items.forEach((item, i) => {
        const startAngle = i * sliceAngle - Math.PI / 2;
        const endAngle = startAngle + sliceAngle;

        // Draw Slice
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, startAngle, endAngle);
        ctx.closePath();
        
        const color = COLORS[i % COLORS.length];
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        grad.addColorStop(0, lighten(color, 15));
        grad.addColorStop(1, color);
        ctx.fillStyle = grad;
        ctx.fill();
        
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Draw Text
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(startAngle + sliceAngle / 2);
        
        ctx.fillStyle = '#000000';
        // Using Outfit font for the wheel text
        ctx.font = `bold ${fontSize}px Outfit`;
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        
        const text = truncateText(ctx, item, r * 0.65);
        ctx.fillText(text, r - 30, 0);
        ctx.restore();
      });
    }

    // === Confetti System ===
    function createConfetti() {
      const colors = ['#f59e0b', '#8b5cf6', '#22c55e', '#ec4899', '#3b82f6', '#fbbf24'];
      const container = document.body;
      
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.classList.add('confetti');
        
        const size = Math.random() * 10 + 5;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const left = Math.random() * 100;
        const duration = Math.random() * 2 + 1.5;
        const delay = Math.random() * 0.5;
        
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.backgroundColor = color;
        particle.style.left = `${left}vw`;
        particle.style.top = '-20px';
        particle.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        particle.style.animation = `confetti-fall ${duration}s ease-out ${delay}s forwards`;
        
        container.appendChild(particle);
        
        setTimeout(() => {
          particle.remove();
        }, (duration + delay) * 1000 + 100);
      }
    }

    // === Utilities ===
    function lighten(hex, percent) {
      const num = parseInt(hex.replace('#', ''), 16);
      const amt = Math.round(2.55 * percent);
      const R = Math.min(255, (num >> 16) + amt);
      const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
      const B = Math.min(255, (num & 0x0000FF) + amt);
      return `#${(0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1)}`;
    }

    function truncateText(ctx, text, maxWidth) {
      let width = ctx.measureText(text).width;
      if (width <= maxWidth) return text;
      while (width > maxWidth && text.length > 0) {
        text = text.slice(0, -1);
        width = ctx.measureText(text + '...').width;
      }
      return text + '...';
    }

    function formatDate(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleDateString('en-US', { 
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
      });
    }

    function escapeHtml(text) {
      if (!text) return "";
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function shareWheel() {
      if (items.length === 0) return alert("Add options first!");
      // Share current active items
      const data = btoa(JSON.stringify(items));
      const url = `${window.location.origin}${window.location.pathname}?d=${data}`;
      navigator.clipboard.writeText(url).then(() => alert('Link copied to clipboard!'));
    }

    // Initialize
    init();
  </script>
</body>
